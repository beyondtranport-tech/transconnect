<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Account to Base64 Encoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-2">Service Account to Base64 Encoder</h1>
        <p class="text-gray-600 mb-6">This tool runs entirely in your browser. Your private key is not sent to any server.</p>

        <div class="space-y-4">
            <div>
                <label for="json-input" class="block text-sm font-medium text-gray-700 mb-1">1. Paste your full Service Account JSON here:</label>
                <textarea id="json-input" rows="10" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder='{ "type": "service_account", "project_id": "...", ... }'></textarea>
            </div>

            <button id="encode-btn" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">
                2. Encode to Base64
            </button>

            <div>
                <label for="base64-output" class="block text-sm font-medium text-gray-700 mb-1">3. Copy the result:</label>
                <div class="relative">
                    <textarea id="base64-output" rows="5" class="w-full p-2 border border-gray-300 rounded-md bg-gray-50 font-mono text-sm" readonly></textarea>
                    <button id="copy-btn" class="absolute top-2 right-2 bg-gray-200 text-gray-700 text-xs font-semibold py-1 px-2 rounded hover:bg-gray-300">Copy</button>
                </div>
            </div>
        </div>

        <div id="status" class="mt-4 text-sm"></div>
    </div>

    <script>
        const jsonInput = document.getElementById('json-input');
        const base64Output = document.getElementById('base64-output');
        const encodeBtn = document.getElementById('encode-btn');
        const copyBtn = document.getElementById('copy-btn');
        const statusDiv = document.getElementById('status');

        encodeBtn.addEventListener('click', () => {
            const jsonString = jsonInput.value;
            if (!jsonString) {
                statusDiv.textContent = 'Error: Input is empty.';
                statusDiv.className = 'mt-4 text-sm text-red-600';
                return;
            }
            try {
                // Validate that it's JSON
                JSON.parse(jsonString);
                // Encode to Base64
                const base64String = btoa(jsonString);
                base64Output.value = base64String;
                statusDiv.textContent = 'Successfully encoded!';
                statusDiv.className = 'mt-4 text-sm text-green-600';
            } catch (error) {
                statusDiv.textContent = 'Error: Invalid JSON. Please paste the entire file content.';
                statusDiv.className = 'mt-4 text-sm text-red-600';
                base64Output.value = '';
            }
        });

        copyBtn.addEventListener('click', () => {
            if (!base64Output.value) return;
            navigator.clipboard.writeText(base64Output.value).then(() => {
                statusDiv.textContent = 'Copied to clipboard!';
                statusDiv.className = 'mt-4 text-sm text-green-600';
            }).catch(err => {
                statusDiv.textContent = 'Failed to copy.';
                statusDiv.className = 'mt-4 text-sm text-red-600';
            });
        });
    </script>
</body>
</html>
